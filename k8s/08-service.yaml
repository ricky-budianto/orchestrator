apiVersion: v1
kind: Service
metadata:
  name: orchestrator-service
  namespace: ces-orchestrator
  labels:
    app: orchestrator
spec:
  type: LoadBalancer
  selector:
    app: orchestrator
  ports:
  - name: http
    port: 80
    targetPort: 8081
  - name: metrics
    port: 8081
    targetPort: 8081
