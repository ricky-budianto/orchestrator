apiVersion: apps/v1
kind: Deployment
metadata:
  name: orchestrator
  namespace: ces-orchestrator
  labels:
    app: orchestrator
    version: v1
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: orchestrator
  template:
    metadata:
      labels:
        app: orchestrator
        version: v1
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8081"
        prometheus.io/path: "/metrics"
    spec:
      containers:
      - name: orchestrator
        image: YOUR-REGISTRY/ces-orchestrator:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8081
          name: http
        envFrom:
        - configMapRef:
            name: orchestrator-config
        env:
        - name: POSTGRE_SQL_USER
          valueFrom:
            secretKeyRef:
              name: orchestrator-secrets
              key: POSTGRE_SQL_USER
        - name: POSTGRE_SQL_PASSWORD
          valueFrom:
            secretKeyRef:
              name: orchestrator-secrets
              key: POSTGRE_SQL_PASSWORD
        - name: CRYPTO_RSA
          valueFrom:
            secretKeyRef:
              name: orchestrator-secrets
              key: CRYPTO_RSA
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /
            port: 8081
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 8081
          initialDelaySeconds: 10
          periodSeconds: 5
