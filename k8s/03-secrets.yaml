apiVersion: v1
kind: Secret
metadata:
  name: orchestrator-secrets
  namespace: ces-orchestrator
type: Opaque
stringData:
  # PostgreSQL Credentials
  POSTGRE_SQL_USER: "postgres"
  POSTGRE_SQL_PASSWORD: "CHANGE-ME-SECURE-PASSWORD"
  POSTGRE_SQL_ORCHESTRATOR_USER: "postgres"
  POSTGRE_SQL_ORCHESTRATOR_PASSWORD: "CHANGE-ME-SECURE-PASSWORD"

  # Redis Password
  REDIS_PASSWORD: ""

  # Crypto RSA Key (base64 encoded private key)
  CRYPTO_RSA: "CHANGE-ME-BASE64-RSA-KEY"

  # Elasticsearch Credentials (if used)
  ELASTICSEARCH_USER: ""
  ELASTICSEARCH_PASSWORD: ""
