name: AWS Docker Image CES Orchestrator

on:
  push:
    tags:
      - "*"

jobs:
  build:
    permissions:
      packages: write
      id-token: write
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Get the version
        id: get_version
        run: |
          echo "VERSION=${GITHUB_REF/refs\/tags\//}" >> $GITHUB_ENV

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          role-to-assume: arn:aws:iam::821916800614:role/aws-ces-ibridgeorchestrator-githubaction-Role-1DTD9ECNCP8HG
          aws-region: ap-southeast-1
      
      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v1
      
      - name: Docker Login to ECR
        uses: docker/login-action@v2
        with:
          registry: ${{ steps.ecr-login.outputs.registry }}

      - name: Get Tags for Image
        id: metadata
        uses: docker/metadata-action@v3
        with:
          images: ${{ steps.ecr-login.outputs.registry }}/ibridge-services
          tags: |
            type=raw,value=latest
            type=raw,value=${{ env.VERSION }}
            type=sha

      - name: Build the Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: false
          tags: ${{ steps.metadata.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          load: true
          secrets: |
            "GITHUB_USERNAME=${{ secrets.G_USERNAME }}"
            "GITHUB_TOKEN=${{ secrets.G_TOKEN }}"

      - name: Push to ECR
        run: |
          docker push 821916800614.dkr.ecr.ap-southeast-1.amazonaws.com/ibridge-services:latest
          docker push 821916800614.dkr.ecr.ap-southeast-1.amazonaws.com/ibridge-services:${{ env.VERSION }}