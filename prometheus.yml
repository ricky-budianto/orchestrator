global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  # - "first_rules.yml"
  # - "second_rules.yml"

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'ces-orchestrator'
    static_configs:
      - targets: ['host.docker.internal:8081']  # Your service metrics endpoint
    metrics_path: '/metrics'
    scrape_interval: 5s

  - job_name: 'tempo'
    static_configs:
      - targets: ['tempo:3200']
    scrape_interval: 15s