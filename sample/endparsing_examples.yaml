# ============================================================================
# END PARSING TYPES DEMONSTRATION
# ============================================================================
# This file demonstrates the three types of endParsing options and their
# differences in response formatting.
#
# endParsing Types:
# 1. "Separated" - Returns each sourceRef field as separate response fields
# 2. "Combined" - Merges all sourceRef fields into a single combined object
# 3. "raw" - Returns the sourceRef data as-is without any processing
# ============================================================================

# ============================================================================
# EXAMPLE 1: SEPARATED (Most Common)
# ============================================================================
# Configuration:
name: endparsing_separated_example
requestType: endparsing_separated
path: /api/ibridge/v1/endparsing/separated
method: POST
startEvent:
  targetRef: get_user_data

serviceTask:
  get_user_data:
    type: worker
    sourceRefParsing: ${{ibridge.httprequest}}
    sourceRef:
      authorization: ${{startEvent.Authorization}}
      body:
        user_id: ${{startEvent.Body.user_id}}
    targetRef:
      - get_transaction_history
    worker: middleware

  get_transaction_history:
    type: worker
    sourceRefParsing: ${{ibridge.httprequest}}
    sourceRef:
      authorization: ${{startEvent.Authorization}}
      body:
        user_id: ${{startEvent.Body.user_id}}
    targetRef:
      - ibridge-reply-separated
    worker: middleware

  ibridge-reply-separated:
    type: endEvent
    taskRef: ibridge-reply-separated
    endParsing: Separated
    sourceRef:
      user_info:
        user_id: ${{get_user_data.data.data.user_id}}
        name: ${{get_user_data.data.data.name}}
        email: ${{get_user_data.data.data.email}}
      transactions:
        total_count: ${{get_transaction_history.data.data.count}}
        recent_transactions: ${{get_transaction_history.data.data.transactions}}
      metadata:
        timestamp: ${{ibridge.timestamp}}
        request_id: ${{get_user_data.data.data.request_id}}

# Response Format with "Separated":
# {
#   "user_info": {
#     "user_id": "12345",
#     "name": "John Doe",
#     "email": "john@example.com"
#   },
#   "transactions": {
#     "total_count": 50,
#     "recent_transactions": [...]
#   },
#   "metadata": {
#     "timestamp": "2025-10-05T12:00:00Z",
#     "request_id": "req_123"
#   }
# }

---

# ============================================================================
# EXAMPLE 2: COMBINED (Merged Response)
# ============================================================================
# Configuration:
name: endparsing_combined_example
requestType: endparsing_combined
path: /api/ibridge/v1/endparsing/combined
method: POST
startEvent:
  targetRef: get_user_data_combined

serviceTask:
  get_user_data_combined:
    type: worker
    sourceRefParsing: ${{ibridge.httprequest}}
    sourceRef:
      authorization: ${{startEvent.Authorization}}
      body:
        user_id: ${{startEvent.Body.user_id}}
    targetRef:
      - get_transaction_history_combined
    worker: middleware

  get_transaction_history_combined:
    type: worker
    sourceRefParsing: ${{ibridge.httprequest}}
    sourceRef:
      authorization: ${{startEvent.Authorization}}
      body:
        user_id: ${{startEvent.Body.user_id}}
    targetRef:
      - ibridge-reply-combined
    worker: middleware

  ibridge-reply-combined:
    type: endEvent
    taskRef: ibridge-reply-combined
    endParsing: Combined
