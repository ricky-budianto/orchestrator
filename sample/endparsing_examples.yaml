        recent_transactions: ${{get_transaction_history_raw.data.data.transactions}}

# Response Format with "raw":
# The exact structure of sourceRef is returned without any transformation
# {
#   "user_info": {
#     "user_id": "12345",
#     "name": "John Doe",
#     "email": "john@example.com"
#   },
#   "transactions": {
#     "total_count": 50,
#     "recent_transactions": [...]
#   }
# }

---

# ============================================================================
# COMPARISON SUMMARY
# ============================================================================
#
# When to use each type:
#
# 1. SEPARATED (Recommended for most cases)
#    ✓ Best for structured, organized responses
#    ✓ Clear separation of different data domains
#    ✓ Easy for frontend to consume
#    ✓ Good for complex responses with multiple sections
#
# 2. COMBINED
#    ✓ Best for simple, flat responses
#    ✓ When all fields are at the same level
#    ✓ Simpler response structure
#    ✓ Good for backward compatibility
#
# 3. RAW
#    ✓ Best when you need exact control over response structure
#    ✓ When sourceRef is already properly formatted
#    ✓ No additional processing needed
#    ✓ Good for pass-through responses
#
# ============================================================================

---

# ============================================================================
# ADVANCED: DYNAMIC RESPONSE BASED ON CONDITION
# ============================================================================
# You can have different endParsing types in different end events
name: dynamic_endparsing_example
requestType: dynamic_endparsing
path: /api/ibridge/v1/endparsing/dynamic
method: POST
startEvent:
  targetRef: check_response_format

serviceTask:
  check_response_format:
    type: worker
    sourceRefParsing: ${{ibridge.httprequest}}
    sourceRef:
      authorization: ${{startEvent.Authorization}}
      body:
        user_id: ${{startEvent.Body.user_id}}
        # Client can request format
        response_format: ${{startEvent.Body.response_format}}
    targetRef:
      - condition_response_format
    worker: middleware

  condition_response_format:
    type: conditional
    condition:
      variableCheck:
        - ${{check_response_format.data.data.format_preference}}
      value:
        - case:
          - "detailed"
          target: ibridge-reply-detailed
        - case:
          - "simple"
          target: ibridge-reply-simple
    defaultTasK: ibridge-reply-default

  # Detailed response with Separated format
  ibridge-reply-detailed:
    type: endEvent
    taskRef: ibridge-reply-detailed
    endParsing: Separated
    sourceRef:
      user:
        user_id: ${{check_response_format.data.data.user_id}}
        details: ${{check_response_format.data.data.user_details}}
      meta:
        format: "detailed"
        timestamp: ${{ibridge.timestamp}}

  # Simple response with Combined format
  ibridge-reply-simple:
    type: endEvent
    taskRef: ibridge-reply-simple
    endParsing: Combined
    sourceRef:
      user_id: ${{check_response_format.data.data.user_id}}
      format: "simple"

  # Default response with raw format
  ibridge-reply-default:
    type: endEvent
    taskRef: ibridge-reply-default
    endParsing: raw
    sourceRef: ${{check_response_format.data}}

# ============================================================================
