startEvent:
  targetRef: get_user_data_raw

serviceTask:
  get_user_data_raw:
    type: worker
    sourceRefParsing: ${{ibridge.httprequest}}
    sourceRef:
      authorization: ${{startEvent.Authorization}}
      body:
        user_id: ${{startEvent.Body.user_id}}
    targetRef:
      - get_transaction_history_raw
    worker: middleware

  get_transaction_history_raw:
    type: worker
    sourceRefParsing: ${{ibridge.httprequest}}
    sourceRef:
      authorization: ${{startEvent.Authorization}}
      body:
        user_id: ${{startEvent.Body.user_id}}
    targetRef:
      - ibridge-reply-raw
    worker: middleware

  ibridge-reply-raw:
