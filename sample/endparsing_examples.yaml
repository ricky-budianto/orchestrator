# Response Format with "Combined":
# {
#   "user_id": "12345",
#   "name": "John Doe",
#   "email": "john@example.com",
#   "total_count": 50,
#   "recent_transactions": [...],
#   "timestamp": "2025-10-05T12:00:00Z",
#   "request_id": "req_123"
# }
# All fields are merged into a single flat object

---

# ============================================================================
# EXAMPLE 3: RAW (Unprocessed Response)
# ============================================================================
# Configuration:
name: endparsing_raw_example
requestType: endparsing_raw
