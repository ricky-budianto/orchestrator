      user_id: ${{get_user_data_combined.data.data.user_id}}
      name: ${{get_user_data_combined.data.data.name}}
      email: ${{get_user_data_combined.data.data.email}}
      total_count: ${{get_transaction_history_combined.data.data.count}}
